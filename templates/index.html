<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trading Bot Pro</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: #020617; /* deep black-blue */
    color: #e2e8f0;
}

/* 📊 Canvas background */
#chart {
    position: absolute;
    width: 100%;
    height: 100%;
}

/* 🌑 Dark overlay for contrast */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(2, 6, 23, 0.75);
}

/* 🧊 Glass Panel */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    width: 380px;
    padding: 28px;

    background: rgba(15, 23, 42, 0.85); /* dark glass */
    backdrop-filter: blur(18px);

    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.05);

    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}

/* Title */
h2 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 500;
    color: #f1f5f9;
}

/* Inputs */
input, select {
    width: 100%;
    padding: 11px;
    margin-bottom: 12px;

    background: #020617;
    border: 1px solid #1e293b;
    border-radius: 8px;

    color: #e2e8f0;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;

    background: linear-gradient(90deg, #16a34a, #22c55e);
    color: white;
    font-weight: 600;

    cursor: pointer;
    transition: 0.25s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(34,197,94,0.3);
}

/* Result */
.result {
    margin-top: 12px;
    padding: 10px;
    border-radius: 10px;
    display: none;
}

.success {
    background: rgba(34,197,94,0.15);
    border: 1px solid rgba(34,197,94,0.4);
}

.error {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.4);
}

.loading {
    text-align: center;
    margin-top: 10px;
    display: none;
}
</style>
</head>

<body>

<canvas id="chart"></canvas>
<div class="overlay"></div>

<div class="container">
    <h2>Trading Bot</h2>

    <form id="orderForm">
        <input name="symbol" value="BTCUSDT">
        <select name="side">
            <option>BUY</option>
            <option>SELL</option>
        </select>
        <select name="type">
            <option>MARKET</option>
            <option>LIMIT</option>
        </select>
        <input name="quantity" placeholder="Quantity">
        <input name="price" placeholder="Price">
        <button type="submit">Place Order</button>
    </form>

    <div class="loading" id="loading">⏳ Processing...</div>
    <div class="result" id="result"></div>
</div>

<script>
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let candles = [];
let lastPrice = 100;

// initial candles
for (let i = 0; i < 40; i++) {
    const open = lastPrice;
    const close = open + (Math.random() - 0.5) * 6;
    const high = Math.max(open, close) + Math.random() * 3;
    const low = Math.min(open, close) - Math.random() * 3;

    candles.push({ open, close, high, low });
    lastPrice = close;
}

let current = { open: lastPrice, close: lastPrice, high: lastPrice, low: lastPrice };

function getBounds() {
    let min = Infinity, max = -Infinity;

    [...candles, current].forEach(c => {
        if (c.low < min) min = c.low;
        if (c.high > max) max = c.high;
    });

    return { min, max };
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const { min, max } = getBounds();
    const range = max - min;

    const candleWidth = 6;
    const gap = 3;

    [...candles, current].forEach((c, i) => {
        const x = i * (candleWidth + gap) + 80;

        const scale = canvas.height / range;

        const openY = canvas.height - (c.open - min) * scale;
        const closeY = canvas.height - (c.close - min) * scale;
        const highY = canvas.height - (c.high - min) * scale;
        const lowY = canvas.height - (c.low - min) * scale;

        const green = c.close >= c.open;

        ctx.strokeStyle = green ? "#22c55e" : "#ef4444";
        ctx.fillStyle = green ? "#16a34a" : "#dc2626";

        ctx.globalAlpha = 0.7;

        // wick
        ctx.beginPath();
        ctx.moveTo(x + candleWidth/2, highY);
        ctx.lineTo(x + candleWidth/2, lowY);
        ctx.stroke();

        // body
        ctx.fillRect(
            x,
            Math.min(openY, closeY),
            candleWidth,
            Math.abs(openY - closeY) || 1
        );
    });

    ctx.globalAlpha = 1;
}

function animate() {
    current.close += (Math.random() - 0.5) * 0.2;
    current.high = Math.max(current.high, current.close);
    current.low = Math.min(current.low, current.close);

    draw();
    requestAnimationFrame(animate);
}
animate();

setInterval(() => {
    candles.push(current);
    if (candles.length > 60) candles.shift();

    current = {
        open: current.close,
        close: current.close,
        high: current.close,
        low: current.close
    };
}, 2500);

// form
const form = document.getElementById("orderForm");
const resultBox = document.getElementById("result");
const loading = document.getElementById("loading");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    loading.style.display = "block";
    resultBox.style.display = "none";

    const res = await fetch("/order", {
        method: "POST",
        body: new FormData(form)
    });

    const data = await res.json();

    loading.style.display = "none";
    resultBox.style.display = "block";

    if (data.status === "success") {
        resultBox.className = "result success";
        resultBox.innerHTML = `✅ Order ID: ${data.data.orderId}`;
    } else {
        resultBox.className = "result error";
        resultBox.innerHTML = `❌ ${data.message}`;
    }
});
</script>

</body>
</html>
